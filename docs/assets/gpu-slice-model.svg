<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="-apple-system,'Segoe UI',Roboto,'Noto Sans KR',sans-serif">
<title>GPU slice 모델</title>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text x="160" y="46" font-size="12" fill="#888780">slice 1</text>
<text x="566" y="46" font-size="12" fill="#888780">slice 7</text>

<text x="148" y="90" font-size="12" fill="#888780" text-anchor="end" dominant-baseline="central">GPU 0 · whole</text>
<rect x="160" y="70" width="448" height="40" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="384" y="90" font-size="14" font-weight="500" fill="#085041" text-anchor="middle" dominant-baseline="central">full GPU 워크로드 점유</text>

<text x="148" y="160" font-size="12" fill="#888780" text-anchor="end" dominant-baseline="central">GPU 1 · static</text>
<rect x="160" y="140" width="192" height="40" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="256" y="160" font-size="14" font-weight="500" fill="#3C3489" text-anchor="middle" dominant-baseline="central">3g.40gb</text>
<rect x="356" y="140" width="192" height="40" rx="4" fill="none" stroke="#7F77DD" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="452" y="160" font-size="12" fill="#888780" text-anchor="middle" dominant-baseline="central">3g.40gb 미할당</text>
<rect x="552" y="140" width="56" height="40" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="580" y="160" font-size="12" fill="#3C3489" text-anchor="middle" dominant-baseline="central">1g</text>

<text x="148" y="230" font-size="12" fill="#888780" text-anchor="end" dominant-baseline="central">GPU 2 · dynamic</text>
<rect x="160" y="210" width="448" height="40" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="384" y="230" font-size="12" fill="#5F5E5A" text-anchor="middle" dominant-baseline="central">미사용 · 요청 시 커빙 가능</text>

<text x="340" y="288" font-size="12" fill="#888780" text-anchor="middle" dominant-baseline="central">GPU 1개 = compute slice 7칸 · 색칠된 블록 = 할당된 MIG 인스턴스</text>
</svg>
