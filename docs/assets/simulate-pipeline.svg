<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 550" font-family="-apple-system,'Segoe UI',Roboto,'Noto Sans KR',sans-serif">
<title>Simulator pipeline</title>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect x="110" y="40" width="200" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="210" y="58" font-size="14" font-weight="500" fill="#444441" text-anchor="middle" dominant-baseline="central">Node pools</text>
<text x="210" y="78" font-size="12" fill="#5F5E5A" text-anchor="middle" dominant-baseline="central">spec × count · MIG mode</text>

<rect x="370" y="40" width="200" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="470" y="58" font-size="14" font-weight="500" fill="#444441" text-anchor="middle" dominant-baseline="central">Workloads</text>
<text x="470" y="78" font-size="12" fill="#5F5E5A" text-anchor="middle" dominant-baseline="central">full/MIG requests · replicas</text>

<line x1="210" y1="96" x2="210" y2="132" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="470" y1="96" x2="470" y2="132" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="110" y="136" width="460" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="154" font-size="14" font-weight="500" fill="#444441" text-anchor="middle" dominant-baseline="central">Preprocessing</text>
<text x="340" y="174" font-size="12" fill="#5F5E5A" text-anchor="middle" dominant-baseline="central">expand nodes · static partitioning · full-first sort</text>

<line x1="340" y1="192" x2="340" y2="228" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="140" y="232" width="400" height="200" rx="16" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="256" font-size="14" font-weight="500" fill="#3C3489" text-anchor="middle" dominant-baseline="central">simulate() placement loop</text>

<rect x="170" y="276" width="340" height="56" rx="8" fill="#FFFFFF" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="294" font-size="14" font-weight="500" fill="#3C3489" text-anchor="middle" dominant-baseline="central">Phase 1 · place full-GPU requests</text>
<text x="340" y="314" font-size="12" fill="#534AB7" text-anchor="middle" dominant-baseline="central">whole GPUs only · binpack/spread</text>

<line x1="340" y1="332" x2="340" y2="356" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="170" y="360" width="340" height="56" rx="8" fill="#FFFFFF" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="378" font-size="14" font-weight="500" fill="#3C3489" text-anchor="middle" dominant-baseline="central">Phase 2 · place MIG requests</text>
<text x="340" y="398" font-size="12" fill="#534AB7" text-anchor="middle" dominant-baseline="central">reuse instances → carve a new GPU</text>

<line x1="340" y1="432" x2="340" y2="468" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="180" y="472" width="320" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="490" font-size="14" font-weight="500" fill="#085041" text-anchor="middle" dominant-baseline="central">Result</text>
<text x="340" y="510" font-size="12" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">GPU heatmap · failure reason report</text>
</svg>
