<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect x='1' y='5' width='6' height='6' rx='1' fill='%232a78d6'/%3E%3Crect x='9' y='5' width='6' height='6' rx='1' fill='%231baf7a'/%3E%3C/svg%3E"
    />
    <title>Moira — GPU Cluster Capacity Simulator</title>
    <script>
      // Decide the theme before first paint to avoid a flash (FOUC)
      (function () {
        try {
          var t = localStorage.getItem("moira:theme");
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
